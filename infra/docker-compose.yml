version: '3.9'
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/jeevandhara
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    restart: unless-stopped
volumes:
  mongo_data:
